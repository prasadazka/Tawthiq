steps:
  # Build backend image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/tawthiq-backend:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/tawthiq-backend:latest'
      - './backend'

  # Build frontend image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/tawthiq-frontend:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/tawthiq-frontend:latest'
      - './frontend'

  # Push backend image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', 'gcr.io/$PROJECT_ID/tawthiq-backend']

  # Push frontend image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', 'gcr.io/$PROJECT_ID/tawthiq-frontend']

  # Deploy backend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'tawthiq-backend'
      - '--image=gcr.io/$PROJECT_ID/tawthiq-backend:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'

  # Deploy frontend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'tawthiq-frontend'
      - '--image=gcr.io/$PROJECT_ID/tawthiq-frontend:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'

images:
  - 'gcr.io/$PROJECT_ID/tawthiq-backend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/tawthiq-frontend:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
